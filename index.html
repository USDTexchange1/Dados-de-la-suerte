<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Bet Platform Mejorada</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f0f0f;color:#fff;}
.screen{display:none;padding:20px;}
.active{display:block;}
.header{display:flex;justify-content:space-between;align-items:center;background:#1a1a1a;padding:10px 15px;border-bottom:1px solid #333;}
.balance{font-weight:bold;display:flex;align-items:center;}
.add-btn{background:#2ecc71;border:none;border-radius:50%;width:28px;height:28px;font-weight:bold;cursor:pointer;margin-left:10px;}
.card{background:#1c1c1c;padding:20px;border-radius:12px;margin-top:20px;}
input,select{width:100%;padding:10px;margin:8px 0;border:none;border-radius:8px;text-align:center;}
button{padding:10px;border:none;border-radius:8px;margin:5px 0;width:100%;font-weight:bold;cursor:pointer;}
.mayor{background:#2ecc71;}
.menor{background:#e74c3c;}
.igual{background:#f1c40f;}
#resultado{margin-top:15px;text-align:center;}
.wallet-box{background:#111;padding:10px;border-radius:8px;margin-top:10px;word-break:break-all;}
#depositPanel,#codePanel,#promoPanel,#historialPanel{margin-top:15px;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:100;}
.modal-content{background:#1c1c1c;padding:20px;border-radius:12px;width:90%;max-width:400px;text-align:center;}
.modal-content h3{margin-top:0;}
.close-btn{background:#e74c3c;color:#fff;border:none;border-radius:8px;padding:5px 10px;cursor:pointer;margin-top:10px;}
.dado{width:50px;height:50px;margin:0 10px;display:inline-block;background:#fff;color:#000;font-size:24px;font-weight:bold;border-radius:8px;line-height:50px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2c3e50;color:#fff;padding:10px 20px;border-radius:8px;opacity:0;transition:opacity 0.5s;}
.historial-box{background:#111;padding:10px;border-radius:8px;margin-top:10px;max-height:150px;overflow-y:auto;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="authScreen" class="screen active">
  <div class="card">
    <h2>🎲 Acceso</h2>
    <input type="text" id="usuario" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="registrar()">Registrarse</button>
    <button onclick="login()">Iniciar Sesión</button>
  </div>
</div>

<!-- JUEGO -->
<div id="gameScreen" class="screen">
  <div class="header">
    <div class="balance">
      <span id="saldoHeader">Saldo: 0 USDT</span>
      <button class="add-btn" onclick="abrirWallet()">💰</button>
    </div>
  </div>

  <div class="card">
    <h3>Realizar apuesta</h3>
    <input type="number" id="montoApuesta" placeholder="Monto en USDT (≥0.30)">
    <div>
      <button class="mayor" onclick="jugar('mayor')">Mayor x3.2</button>
      <button class="menor" onclick="jugar('menor')">Menor x3.2</button>
      <button class="igual" onclick="jugar('igual')">Igual x5.2</button>
    </div>
    <div style="margin-top:10px;">
      <div id="dado1" class="dado">-</div>
      <div id="dado2" class="dado">-</div>
    </div>
    <div id="resultado"></div>

    <button onclick="mostrarDeposito()">Depositar</button>
    <button onclick="abrirRetiro()">Retirar fondos</button>
    <button onclick="logout()">Cerrar sesión</button>
  </div>

  <!-- PANEL DE DEPÓSITO -->
  <div id="depositPanel" class="card" style="display:none;">
    <h3>Depósito USDT</h3>
    <input type="number" id="depositAmount" placeholder="Monto a depositar (≥3)" min="3">
    <div>
      <label>Selecciona red:</label>
      <select id="depositNetwork">
        <option value="BEP20">USDT BEP20</option>
        <option value="TRON">USDT TRON</option>
      </select>
    </div>
    <div id="depositAddress" class="wallet-box"></div>
    <button onclick="copiarDireccion()">Copiar dirección</button>
    <input type="text" id="depositHash" placeholder="Hash de transacción">
    <button onclick="validarDeposito()">Validar pago</button>
  </div>

  <!-- PANEL DE CÓDIGO -->
  <div id="codePanel" class="card" style="display:none;">
    <h3>Introduce código de activación</h3>
    <input type="text" id="activationCode" maxlength="6" placeholder="Código (ej: ALE000)">
    <button onclick="usarCodigo()">Activar depósito</button>
    <div id="codeResult"></div>
  </div>

  <!-- HISTORIAL DE APUESTAS -->
  <div id="historialPanel" class="card">
    <h3>Historial de Apuestas</h3>
    <div id="historialBox" class="historial-box"></div>
  </div>

</div>

<!-- MODAL WALLET -->
<div id="walletModal" class="modal">
  <div class="modal-content">
    <h3>Direcciones USDT</h3>
    <div class="wallet-box"><strong>BEP20:</strong><br>0x3670a0bFfb8b8A6D42177807F8dFd369A3995b9e</div>
    <div class="wallet-box"><strong>TRON:</strong><br>TJvpGB5oUdyFRPg6YrdwLt8SWgNo6GoKwx</div>
    <button class="close-btn" onclick="cerrarWallet()">Cerrar</button>
  </div>
</div>

<!-- MODAL RETIRO -->
<div id="withdrawModal" class="modal">
  <div class="modal-content">
    <h3>Retirar USDT</h3>
    <select id="withdrawNetwork">
      <option value="BEP20">USDT BEP20</option>
      <option value="TRON">USDT TRON</option>
    </select>
    <input type="number" id="withdrawAmount" placeholder="Monto a retirar (mín 10)">
    <input type="text" id="withdrawAddress" placeholder="Dirección destino">
    <button onclick="procesarRetiro()">Confirmar retiro</button>
    <button class="close-btn" onclick="cerrarRetiro()">Cancelar</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ================= CONFIG =================
const WALLET_BEP20 = "0x3670a0bFfb8b8A6D42177807F8dFd369A3995b9e";
const WALLET_TRON  = "TJvpGB5oUdyFRPg6YrdwLt8SWgNo6GoKwx";
const PROMO_CODES = { "ALE000":5, "WELCOME":3 };

// ================= STORAGE =================
function obtenerUsuarios(){ return JSON.parse(localStorage.getItem("usuarios")) || {}; }
function guardarUsuarios(data){ localStorage.setItem("usuarios", JSON.stringify(data)); }

// ================= TOAST =================
function mostrarToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.opacity="1";
  setTimeout(()=>{ t.style.opacity="0"; },3000);
}

// ================= REGISTRO =================
function registrar(){
  let user = usuario.value.trim();
  let pass = password.value.trim();
  if(!user || !pass){ mostrarToast("Completa los datos"); return; }
  let usuarios = obtenerUsuarios();
  if(usuarios[user]){ mostrarToast("El usuario ya existe"); return; }
  usuarios[user] = { password: pass, saldo: 0, depositos: [], apuestas: [] };
  guardarUsuarios(usuarios);
  mostrarToast("Registro exitoso");
}

// ================= LOGIN =================
function login(){
  let user = usuario.value.trim();
  let pass = password.value.trim();
  let usuarios = obtenerUsuarios();
  if(user==="alejandromedina135@gmail.com" && pass==="ale1234"){
    if(!usuarios[user]){ usuarios[user] = { password: pass, saldo:120.47, depositos:[], apuestas:[] }; guardarUsuarios(usuarios); }
    localStorage.setItem("usuarioActivo", user); cargarJuego(); return;
  }
  if(!usuarios[user] || usuarios[user].password!==pass){ mostrarToast("Datos incorrectos"); return; }
  localStorage.setItem("usuarioActivo", user); cargarJuego();
}

// ================= CAMBIO DE PANTALLA =================
function cargarJuego(){
  authScreen.classList.remove("active");
  gameScreen.classList.add("active");
  depositPanel.style.display="none";
  codePanel.style.display="none";
  actualizarSaldo();
  actualizarHistorial();
}
function logout(){ localStorage.removeItem("usuarioActivo"); location.reload(); }

// ================= SALDO =================
function actualizarSaldo(){
  let usuarios = obtenerUsuarios();
  let activo = localStorage.getItem("usuarioActivo");
  saldoHeader.innerText = "Saldo: "+usuarios[activo].saldo.toFixed(2)+" USDT";
}

// ================= HISTORIAL =================
function actualizarHistorial(){
  let usuarios = obtenerUsuarios();
  let activo = localStorage.getItem("usuarioActivo");
  let box = document.getElementById("historialBox");
  box.innerHTML="";
  if(!usuarios[activo].apuestas) usuarios[activo].apuestas=[];
  usuarios[activo].apuestas.slice().reverse().forEach(a=>{
    const div = document.createElement("div");
    div.innerHTML=`[${a.fecha}] ${a.tipo.toUpperCase()} - Monto: ${a.monto} - Resultado: ${a.resultado}`;
    box.appendChild(div);
  });
}

// ================= WALLET =================
function abrirWallet(){ walletModal.style.display="flex"; }
function cerrarWallet(){ walletModal.style.display="none"; }

// ================= DEPOSIT =================
function mostrarDeposito(){
  depositPanel.style.display="block";
  actualizarDireccion();
}
function actualizarDireccion(){
  let network = depositNetwork.value;
  depositAddress.innerText = network==="BEP20"? WALLET_BEP20 : WALLET_TRON;
}
depositNetwork.addEventListener("change", actualizarDireccion);
function copiarDireccion(){
  try{
    navigator.clipboard.writeText(depositAddress.innerText);
    mostrarToast("Dirección copiada al portapapeles");
  } catch(e){ alert("Error al copiar"); }
}
function validarDeposito(){
  let amount = parseFloat(depositAmount.value);
  if(isNaN(amount) || amount<3){ mostrarToast("Monto mínimo 3 USDT"); return; }
  let hash = depositHash.value.trim();
  if(!hash){ mostrarToast("Ingresa hash"); return; }
  let usuarios = obtenerUsuarios();
  let activo = localStorage.getItem("usuarioActivo");
  usuarios[activo].depositos.push({monto:amount, hash:hash, estado:"pendiente", fecha:new Date().toLocaleString()});
  guardarUsuarios(usuarios);

  // Enviar correo
  let network = depositNetwork.value;
  let address = network==="BEP20"? WALLET_BEP20 : WALLET_TRON;
  let body = `Hola, he realizado un depósito en mi cuenta de ${amount} USDT.\nHash: ${hash}\nRed: ${network}\nDirección: ${address}`;
  window.location.href=`mailto:reffgame.oficial@gmail.com?subject=Depósito USDT&body=${encodeURIComponent(body)}`;

  depositPanel.style.display="none";
  codePanel.style.display="block";
  mostrarToast("Correo enviado. Ingresa código de activación recibido.");
}

// ================= CÓDIGOS PROMOCIONALES =================
function usarCodigo(){
  let code = activationCode.value.trim().toUpperCase();
  if(!code){ mostrarToast("Ingresa código"); return; }
  let usuarios = obtenerUsuarios();
  let activo = localStorage.getItem("usuarioActivo");
  let ultimoDep = [...usuarios[activo].depositos].reverse().find(d=>d.estado==="pendiente");
  if(!ultimoDep){ mostrarToast("No hay depósito pendiente"); return; }
  if(!PROMO_CODES[code]){ codeResult.innerText="Código inválido"; return; }
  if(ultimoDep.monto>=3){
    usuarios[activo].saldo += PROMO_CODES[code] + ultimoDep.monto;
    ultimoDep.estado="completado";
    guardarUsuarios(usuarios);
    actualizarSaldo();
    codeResult.innerText = `Depósito + promoción activada. Ganaste ${PROMO_CODES[code]} USDT ✅`;
    codePanel.style.display="none";
    actualizarHistorial();
  } else { mostrarToast("Debes depositar al menos 3 USDT para usar el código"); }
}

// ================= JUEGO =================
function jugar(tipo){
  let monto = parseFloat(montoApuesta.value);
  if(isNaN(monto) || monto<0.3){ mostrarToast("Apuesta mínima 0.30 USDT"); return; }
  let usuarios = obtenerUsuarios();
  let activo = localStorage.getItem("usuarioActivo");
  if(monto>usuarios[activo].saldo){ mostrarToast("Saldo insuficiente"); return; }

  let dado1Elem = document.getElementById("dado1");
  let dado2Elem = document.getElementById("dado2");
  let animCount = 0;
  let anim = setInterval(()=>{
    dado1Elem.innerText=Math.floor(Math.random()*6)+1;
    dado2Elem.innerText=Math.floor(Math.random()*6)+1;
    animCount++;
    if(animCount>=25){
      clearInterval(anim);
      let d1 = parseInt(dado1Elem.innerText);
      let d2 = parseInt(dado2Elem.innerText);
      let gana=false;
      if(tipo==="mayor" && d1>=4 && d2>=4) gana=true;
      if(tipo==="menor" && d1<=3 && d2<=3) gana=true;
      if(tipo==="igual" && d1===d2) gana=true;
      let mult = (tipo==="igual")?5.2:3.2;
      let msg = `Dados: ${d1} y ${d2}<br>`;
      if(gana){ let ganancia=monto*mult; usuarios[activo].saldo+=ganancia; msg+="🎉 Ganaste "+ganancia.toFixed(2)+" USDT"; }
      else{ usuarios[activo].saldo-=monto; msg+="❌ Perdiste "+monto.toFixed(2)+" USDT"; }
      guardarUsuarios(usuarios);
      actualizarSaldo();
      resultado.innerHTML = msg;

      // Guardar historial de apuestas
      usuarios[activo].apuestas.push({fecha:new Date().toLocaleString(), tipo, monto, resultado:gana?"Ganado":"Perdido"});
      guardarUsuarios(usuarios);
      actualizarHistorial();
    }
  },200);
}

// ================= RETIRO =================
function abrirRetiro(){ withdrawModal.style.display="flex"; }
function cerrarRetiro(){ withdrawModal.style.display="none"; }
function procesarRetiro(){
  let network = withdrawNetwork.value;
  let amount = parseFloat(withdrawAmount.value);
  let address = withdrawAddress.value.trim();
  let usuarios = obtenerUsuarios();
  let activo = localStorage.getItem("usuarioActivo");
  if(isNaN(amount) || amount<10){ mostrarToast("Monto mínimo 10 USDT"); return; }
  if(amount>usuarios[activo].saldo){ mostrarToast("Saldo insuficiente"); return; }
  if(!address){ mostrarToast("Debes ingresar dirección destino"); return; }
  usuarios[activo].saldo -= amount;
  guardarUsuarios(usuarios);
  actualizarSaldo();
  let body = `Solicitud de retiro:\nUsuario: ${activo}\nRed: ${network}\nMonto: ${amount} USDT\nDirección destino: ${address}`;
  window.location.href=`mailto:reffgame.oficial@gmail.com?subject=Solicitud de Retiro&body=${encodeURIComponent(body)}`;
  mostrarToast("Solicitud enviada correctamente");
  cerrarRetiro();
}

// ================= AUTOLOGIN =================
if(localStorage.getItem("usuarioActivo")){ cargarJuego(); }

</script>
</body>
  </html>
